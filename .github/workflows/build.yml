name: Build & Release

# Push a version tag to build installers and publish them to a GitHub Release:
#   git tag v1.0.0 && git push origin v1.0.0
# Manual runs (workflow_dispatch) build the installers as artifacts without publishing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build${{ startsWith(github.ref, 'refs/tags/') && ' & publish' || '' }}
        run: npx electron-builder --${{ matrix.platform }} --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build unsigned: no Apple/Windows signing certs configured.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers as artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: eliis-archiver-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: ignore
